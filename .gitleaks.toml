title = "toto-wolff gitleaks config"

[allowlist]
description = "Allow example placeholders and test fixtures"
regexes = [
  '''<YOUR_[A-Z_]+>''',
  '''example-key''',
  '''test-key''',
  '''placeholder''',
]

[[rules]]
id = "manifest-auth-token"
description = "Manifest auth token"
regex = '''mnfst_[A-Za-z0-9_\-]{20,}'''
tags = ["token", "manifest"]
[rules.allowlist]
regexes = [
  '''<your-manifest-token>''',
]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API Key"
regex = '''sk-ant-[a-zA-Z0-9\-_]{40,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key assignment"
# The single capture group wraps the VALUE, not the key name — gitleaks reports
# a rule's lone capture group as the finding's "Secret" and rule-scoped allowlist
# regexes match against that field. A capture group around the key name instead
# (e.g. `(api[_-]?key|...)`) makes every finding's "Secret" just the literal
# string "API_KEY" regardless of the actual leaked value — useless for triage,
# and it makes value-scoped allowlisting structurally impossible.
regex = '''(?i)(?:api[_-]?key|apikey|api[_-]?secret)\s*[=:]\s*['""]?([a-zA-Z0-9\-_]{20,})['""]?'''
tags = ["key", "generic"]
[rules.allowlist]
regexes = [
  '''process\.env''',
  '''secrets\.''',
  '''\$\{\{''',
  '''YOUR_''',
  '''sk-ci-smoke-test-placeholder-not-real''',
]
