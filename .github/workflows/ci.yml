name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47  # v4.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install system deps
        run: sudo apt-get install -y ripgrep bats

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  eval-gate:
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47  # v4.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install system deps
        run: sudo apt-get install -y ripgrep bats

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eval-gate (Phase 1 exit gate)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOTO_VAULT_PATH: ${{ runner.temp }}/toto-vault
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "eval-gate: SKIP — ANTHROPIC_API_KEY not configured"
            exit 0
          fi
          mkdir -p "$TOTO_VAULT_PATH"
          git -C "$TOTO_VAULT_PATH" init
          git -C "$TOTO_VAULT_PATH" config user.email "ci@toto-wolff"
          git -C "$TOTO_VAULT_PATH" config user.name "toto-wolff-ci"
          pnpm exec tsx --tsconfig scripts/tsconfig.json scripts/eval-gate.ts

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Scan for secrets
        id: gitleaks-scan
        run: |
          GITLEAKS_EXIT_CODE=0
          gitleaks detect --config .gitleaks.toml --redact --no-banner --report-format json --report-path gitleaks-report.json --exit-code 1 || GITLEAKS_EXIT_CODE=$?
          echo "GITLEAKS_EXIT_CODE=$GITLEAKS_EXIT_CODE" >> "$GITHUB_ENV"

          echo "::group::gitleaks report"
          cat gitleaks-report.json || true
          echo "::endgroup::"

      - name: Upload gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Fail if gitleaks found leaks
        run: |
          if [ "${GITLEAKS_EXIT_CODE:-0}" -ne 0 ]; then
            echo "gitleaks detected secrets (exit code ${GITLEAKS_EXIT_CODE}). See artifact 'gitleaks-report'."
            exit "${GITLEAKS_EXIT_CODE}"
          fi

  check-patterns:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47  # v4.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check sensitive-patterns sync
        run: |
          pnpm check-patterns 2>&1 | tee /tmp/check-patterns-output.txt
          cat /tmp/check-patterns-output.txt >> "$GITHUB_STEP_SUMMARY"

  validate-plugin-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.206

      - name: Validate marketplace + plugin manifest
        run: claude plugin validate .

  plugin-launch-smoke-test:
    runs-on: ubuntu-latest
    needs: validate-plugin-manifest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.206

      - name: Install the plugin fresh (simulates a real marketplace install, no build step)
        run: |
          claude plugin marketplace add "$(pwd)"
          claude plugin install toto-wolff@toto-wolff

      - name: Confirm the manifest's own declared launch command actually boots the server
        run: |
          set -euo pipefail
          CACHE_DIR=$(find "$HOME/.claude/plugins/cache/toto-wolff" -maxdepth 2 -type d -name '*.*.*' | sort -V | tail -1)
          if [ -z "$CACHE_DIR" ]; then
            echo "::error::plugin cache directory not found after install — 'claude plugin install' may have changed its cache layout"
            exit 1
          fi
          if [ -d "$CACHE_DIR/packages/mcp-server/dist" ]; then
            echo "::error::dist/ exists in the installed cache — this smoke test is meant to run against a build-free install; something built it unexpectedly"
            exit 1
          fi

          # Read the command directly from the installed manifest — never hand-copy it —
          # so this test fails the moment plugin.json's launch command drifts from what
          # actually works, instead of silently testing a stale copy.
          COMMAND=$(jq -r '.mcpServers["toto-wolff"].command' "$CACHE_DIR/.claude-plugin/plugin.json")
          ARGS=()
          while IFS= read -r arg; do
            ARGS+=("$arg")
          done < <(jq -r --arg root "$CACHE_DIR" \
            '.mcpServers["toto-wolff"].args[] | gsub("\\$\\{CLAUDE_PLUGIN_ROOT\\}"; $root)' \
            "$CACHE_DIR/.claude-plugin/plugin.json")

          # No node_modules exists yet either (fresh checkout, no pnpm install step
          # in this job) — the launch command's first run installs workspace deps
          # from a cold registry cache before starting the server, so give it real
          # room before checking whether it's alive.
          #
          # ANTHROPIC_API_KEY is a placeholder, never a real secret: CouncilService/
          # P10Service construct eagerly at process startup (index.ts top level,
          # not lazily on first tool call — this is documented, intended behavior,
          # see CLAUDE.md's "MCP Server" section), so createAnthropicClient() throws
          # immediately with no credential at all. This test proves the launch
          # command resolves and the process runs — it never calls a tool, so no
          # real credential or network access is needed, only a non-empty string.
          ANTHROPIC_API_KEY=sk-ci-smoke-test-placeholder-not-real TOTO_MCP_PORT=0 "$COMMAND" "${ARGS[@]}" &
          SERVER_PID=$!
          sleep 60
          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "::error::MCP server exited within 60s of running the plugin's own declared launch command ($COMMAND ${ARGS[*]})"
            exit 1
          fi
          kill "$SERVER_PID"
          echo "Plugin launch smoke test passed: server started and stayed alive from a build-free, dependency-free install."

  pre-commit-hook-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install system deps
        run: sudo apt-get install -y bats

      - name: Run pre-commit hook bats tests
        run: bats tests/pre-commit.bats
