name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  eval-gate:
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eval-gate (Phase 1 exit gate)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOTO_VAULT_PATH: ${{ runner.temp }}/toto-vault
        run: |
          mkdir -p "$TOTO_VAULT_PATH"
          git -C "$TOTO_VAULT_PATH" init
          git -C "$TOTO_VAULT_PATH" config user.email "ci@toto-wolff"
          git -C "$TOTO_VAULT_PATH" config user.name "toto-wolff-ci"
          pnpm exec tsx --tsconfig scripts/tsconfig.json scripts/eval-gate.ts
