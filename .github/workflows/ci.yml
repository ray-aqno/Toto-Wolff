name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47  # v4.0.0
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install system deps
        run: sudo apt-get install -y ripgrep bats

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  eval-gate:
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47  # v4.0.0
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install system deps
        run: sudo apt-get install -y ripgrep bats

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run eval-gate (Phase 1 exit gate)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOTO_VAULT_PATH: ${{ runner.temp }}/toto-vault
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "eval-gate: SKIP — ANTHROPIC_API_KEY not configured"
            exit 0
          fi
          mkdir -p "$TOTO_VAULT_PATH"
          git -C "$TOTO_VAULT_PATH" init
          git -C "$TOTO_VAULT_PATH" config user.email "ci@toto-wolff"
          git -C "$TOTO_VAULT_PATH" config user.name "toto-wolff-ci"
          pnpm exec tsx --tsconfig scripts/tsconfig.json scripts/eval-gate.ts
